name: Bug report
description: Report a reproducible problem in CodeHarbor.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please include clear reproduction details so we can triage quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen?
      placeholder: A short and clear summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Send Matrix message ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs, errors, and screenshots (mask secrets).
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CodeHarbor version
      description: Output of `codeharbor --version` or `/version`.
      placeholder: "0.1.40"
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: AI backend
      description: Which backend was active when the issue happened?
      options:
        - codex
        - claude
        - both
        - not sure
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true
