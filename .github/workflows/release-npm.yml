name: Release NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve publish intent
        id: intent
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$COMMIT_MESSAGE" | grep -qi '\[publish-npm\]'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=marker" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$COMMIT_MESSAGE" | grep -Eqi '\brelease\b' \
            && printf '%s' "$COMMIT_MESSAGE" | grep -Eqi 'v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "reason=release_with_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=false" >> "$GITHUB_OUTPUT"
          echo "reason=no_trigger" >> "$GITHUB_OUTPUT"

      - name: Skip publish (trigger not matched)
        if: steps.intent.outputs.publish != 'true'
        run: |
          echo "Skip npm publish. Commit message does not match trigger rules."
          echo "Allowed: [publish-npm] OR release + semver (for example: release v0.1.1)."

      - name: Checkout
        if: steps.intent.outputs.publish == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: steps.intent.outputs.publish == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm for trusted publishing
        if: steps.intent.outputs.publish == 'true'
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        if: steps.intent.outputs.publish == 'true'
        run: npm ci

      - name: Resolve package metadata
        if: steps.intent.outputs.publish == 'true'
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate release version progression (no skip)
        if: steps.intent.outputs.publish == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          TARGET_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          latest="$(npm view "${PACKAGE_NAME}" version 2>/dev/null || true)"
          if [ -z "${latest}" ]; then
            echo "No published npm version found. Skip progression check."
            exit 0
          fi

          LATEST_VERSION="${latest}" node - <<'NODE'
          const latest = String(process.env.LATEST_VERSION ?? "");
          const target = String(process.env.TARGET_VERSION ?? "");

          function parseSemver(input) {
            const match = input.trim().match(/^(\d+)\.(\d+)\.(\d+)$/);
            if (!match) {
              return null;
            }
            return {
              major: Number.parseInt(match[1], 10),
              minor: Number.parseInt(match[2], 10),
              patch: Number.parseInt(match[3], 10),
            };
          }

          function isNextSemverStep(from, to) {
            const patchStep = to.major === from.major && to.minor === from.minor && to.patch === from.patch + 1;
            const minorStep = to.major === from.major && to.minor === from.minor + 1 && to.patch === 0;
            const majorStep = to.major === from.major + 1 && to.minor === 0 && to.patch === 0;
            return patchStep || minorStep || majorStep;
          }

          const latestParsed = parseSemver(latest);
          const targetParsed = parseSemver(target);
          if (!latestParsed || !targetParsed) {
            console.error(`Invalid semver input: latest=${latest}, target=${target}`);
            process.exit(1);
          }

          if (target === latest) {
            console.log(`Target ${target} equals npm latest ${latest}; will be skipped later if already published.`);
            process.exit(0);
          }

          if (!isNextSemverStep(latestParsed, targetParsed)) {
            console.error(`Release version jump detected: npm latest=${latest}, target=${target}.`);
            console.error("Policy: do not skip versions. If last release CI failed pre-publish, fix CI and retry the same version.");
            process.exit(1);
          }

          console.log(`Version progression OK: ${latest} -> ${target}`);
          NODE

      - name: Changelog check
        if: steps.intent.outputs.publish == 'true'
        run: npm run changelog:check

      - name: Type check
        if: steps.intent.outputs.publish == 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.intent.outputs.publish == 'true'
        run: npm run lint

      - name: Unit tests
        if: steps.intent.outputs.publish == 'true'
        run: npm test

      - name: Coverage checks
        if: steps.intent.outputs.publish == 'true'
        run: npm run test:coverage

      - name: Admin UI e2e tests
        if: steps.intent.outputs.publish == 'true'
        run: npm run test:e2e

      - name: Build
        if: steps.intent.outputs.publish == 'true'
        run: npm run build

      - name: CLI smoke test
        if: steps.intent.outputs.publish == 'true'
        run: node dist/cli.js --help > /dev/null

      - name: Package dry-run
        if: steps.intent.outputs.publish == 'true'
        run: npm pack --dry-run

      - name: Check if version is already published
        if: steps.intent.outputs.publish == 'true'
        id: version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve npm auth mode
        if: steps.intent.outputs.publish == 'true' && steps.version.outputs.exists != 'true'
        id: auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using NPM_TOKEN secret for npm publish."
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
            echo "No NPM_TOKEN secret found. Using npm Trusted Publishing (OIDC)."
          fi

      - name: Publish to npm (trusted publishing)
        if: steps.intent.outputs.publish == 'true' && steps.version.outputs.exists != 'true' && steps.auth.outputs.mode == 'trusted'
        run: npm publish --provenance --access public

      - name: Publish to npm (token fallback)
        if: steps.intent.outputs.publish == 'true' && steps.version.outputs.exists != 'true' && steps.auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Skip publish (version exists)
        if: steps.intent.outputs.publish == 'true' && steps.version.outputs.exists == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          echo "Version already published:"
          echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          next_patch="$(node - <<'NODE'
          const raw = process.env.PACKAGE_VERSION || "";
          const m = raw.trim().match(/^(\d+)\.(\d+)\.(\d+)$/);
          if (!m) {
            process.exit(0);
          }
          const major = Number.parseInt(m[1], 10);
          const minor = Number.parseInt(m[2], 10);
          const patch = Number.parseInt(m[3], 10);
          if (!Number.isFinite(major) || !Number.isFinite(minor) || !Number.isFinite(patch)) {
            process.exit(0);
          }
          process.stdout.write(`${major}.${minor}.${patch + 1}`);
          NODE
          )"
          if [ -n "${next_patch}" ]; then
            echo "Suggested next version: ${next_patch}"
            echo "Suggested release commit: release: v${next_patch} [publish-npm]"
          fi

      - name: Post-publish verification
        if: steps.intent.outputs.publish == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          expected="${PACKAGE_VERSION}"
          name="${PACKAGE_NAME}"
          if [ -z "${name}" ] || [ -z "${expected}" ]; then
            echo "Missing package metadata for verification."
            exit 1
          fi

          echo "Verifying npm latest version for ${name}@${expected}..."
          latest=""
          for i in $(seq 1 18); do
            latest="$(npm view "${name}" version 2>/dev/null || true)"
            if [ "${latest}" = "${expected}" ]; then
              break
            fi
            sleep 10
          done
          if [ "${latest}" != "${expected}" ]; then
            echo "Expected npm latest=${expected}, got ${latest:-<empty>}"
            exit 1
          fi

          npm install -g "${name}@${expected}"
          installed="$(codeharbor --version | tr -d '\r\n')"
          if [ "${installed}" != "${expected}" ]; then
            echo "Installed CLI version mismatch: ${installed} != ${expected}"
            exit 1
          fi

          node - <<'NODE'
          const name = process.env.PACKAGE_NAME;
          const expected = process.env.PACKAGE_VERSION;
          const run = async () => {
            const latestRes = await fetch(`https://registry.npmjs.org/${name}/latest`, { cache: "no-store" });
            const distTagsRes = await fetch(`https://registry.npmjs.org/-/package/${name}/dist-tags`, { cache: "no-store" });
            if (!latestRes.ok || !distTagsRes.ok) {
              throw new Error(`registry endpoints unavailable: latest=${latestRes.status} dist-tags=${distTagsRes.status}`);
            }
            const latest = await latestRes.json();
            const tags = await distTagsRes.json();
            if (latest.version !== expected) {
              throw new Error(`/latest mismatch: ${latest.version} != ${expected}`);
            }
            if (tags.latest !== expected) {
              throw new Error(`/dist-tags latest mismatch: ${tags.latest} != ${expected}`);
            }
            console.log(`Registry verification OK: ${name}@${expected}`);
          };
          run().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE
