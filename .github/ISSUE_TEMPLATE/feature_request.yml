name: Feature request
description: Suggest a user-facing improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please focus on user value and expected behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user pain are you trying to solve?
      placeholder: As a user, I struggle with ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or command/config change.
      placeholder: Add a new command ... / Extend existing config ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative solution you tried.
      placeholder: I currently do ...
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Who benefits and what trade-offs do you see?
      placeholder: This helps users who ... and may affect ...
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues/discussions before submitting.
          required: true
