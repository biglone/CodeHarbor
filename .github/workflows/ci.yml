name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Docs release-index check
        run: npm run docs:check-release-index

      - name: Docs consistency check
        run: npm run docs:check-consistency

      - name: Unit tests
        run: npm test

      - name: Coverage checks (global + core guard)
        run: npm run test:coverage

      - name: Admin UI e2e tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: node dist/cli.js --help > /dev/null

      - name: Package dry-run
        run: npm pack --dry-run
