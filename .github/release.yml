changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "Features"
      labels:
        - enhancement
        - feature
    - title: "Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "CI / Tooling"
      labels:
        - ci
        - chore
    - title: "Other Changes"
      labels:
        - "*"
